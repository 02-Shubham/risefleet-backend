services:
  - type: web
    name: therise-backend
    env: docker
    dockerfilePath: Dockerfile
    healthCheckPath: /health
    region: singapore # Change to your preferred region
    plan: free # Change if using a paid plan
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fleetpulse-db # Or link to your external Neon DB
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      - key: TCP_PORT
        value: 5050
    # IMPORTANT: Render doesn't expose custom TCP ports for Web Services by default.
    # The TCP Ingest might only work if using a "Private Service" or specialized TCP service.
